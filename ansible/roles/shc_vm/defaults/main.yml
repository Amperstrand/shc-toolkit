---
# SHC VM provisioning role defaults
# These can be overridden in group_vars/all.yml or per-host

# VM specification
shc_vm_hostname: "ansible-managed-{{ lookup('password', '/dev/null length=6 chars=hexdigits') }}"
shc_vm_size: "dev-2c-8gb"
shc_vm_ssh_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
shc_vm_wait_timeout: 600

# Whether to cancel the VM when the playbook is torn down
# Set to false for persistent servers
shc_vm_ephemeral: false
