---
# Prepare: install a policy-rc.d that denies service starts during
# package install, and generate self-signed TLS certs at the paths
# the Caddyfile template references.
#
# policy-rc.d is the canonical Debian mechanism: apt's post-install
# hook calls invoke-rc.d, which calls policy-rc.d (if present) to ask
# "should I start this service?". Returning 101 means "action denied
# by policy". This is the standard molecule pattern for testing apt
# packages with post-install service starts that can't work in a
# container (where the service config points at non-resolvable
# domains, missing certs, etc).
#
# Pre-masking the systemd unit (symlink to /dev/null) doesn't work
# because apt treats the masking failure as a fatal install error
# (CI run 29124963105: "Failed to start caddy.service: Unit
# caddy.service is masked").
#
# The self-signed certs are belt-and-suspenders: if caddy somehow
# does get started (e.g. by a future task), at least the cert paths
# exist.

- name: Prepare — deny service starts during apt + generate dummy certs
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Install policy-rc.d that denies all service starts
      ansible.builtin.copy:
        dest: /usr/sbin/policy-rc.d
        mode: "0755"
        content: |
          #!/bin/sh
          # molecule: deny all service start/stop/restart actions during apt install
          exit 101

    - name: Create cert directory
      ansible.builtin.file:
        path: "{{ caddy_cert_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Generate self-signed cert for molecule
      ansible.builtin.command: >
        openssl req -x509 -newkey rsa:2048 -keyout {{ caddy_key_path }}
        -out {{ caddy_cert_path }} -days 1 -nodes
        -subj /CN=molecule-test
      args:
        creates: "{{ caddy_cert_path }}"



