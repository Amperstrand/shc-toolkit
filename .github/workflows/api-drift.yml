name: API Drift Detection

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  drift-check:
    name: Check SHC API for changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest llms.txt
        id: llms
        run: |
          curl -sf "https://blesta.sovereignhybridcompute.com/user-api/llms.txt" -o /tmp/llms-new.txt
          if [ -f shc_toolkit/openapi.json ]; then
            curl -sf "https://blesta.sovereignhybridcompute.com/user-api/openapi.json" -o /tmp/openapi-new.json
          fi

      - name: Compare llms.txt
        id: llms-diff
        run: |
          if [ ! -f .omo/llms.txt ]; then
            mkdir -p .omo
            cp /tmp/llms-new.txt .omo/llms.txt
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "First run — baseline saved"
            exit 0
          fi
          if diff -q .omo/llms.txt /tmp/llms-new.txt > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "llms.txt: no changes"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "llms.txt: CHANGED"
            diff .omo/llms.txt /tmp/llms-new.txt | head -100 > /tmp/llms-diff.txt
          fi

      - name: Compare openapi.json
        id: openapi-diff
        run: |
          if [ ! -f shc_toolkit/openapi.json ] || [ ! -f /tmp/openapi-new.json ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          python3 << 'PYEOF'
          import json
          with open("shc_toolkit/openapi.json") as f:
              old = json.load(f)
          with open("/tmp/openapi-new.json") as f:
              new = json.load(f)

          old_paths = set(old.get("paths", {}).keys())
          new_paths = set(new.get("paths", {}).keys())
          added_paths = new_paths - old_paths
          removed_paths = old_paths - new_paths

          old_version = old.get("info", {}).get("version", "?")
          new_version = new.get("info", {}).get("version", "?")

          # Field-level schema diff: catch new properties in EXISTING schemas
          # (e.g. a new user_data field on VmOrderRequest) that path-diffing
          # alone would miss. Also tracks whole-schema add/remove.
          old_schemas = old.get("components", {}).get("schemas", {})
          new_schemas = new.get("components", {}).get("schemas", {})
          added_schemas = sorted(set(new_schemas) - set(old_schemas))
          removed_schemas = sorted(set(old_schemas) - set(new_schemas))
          prop_changes = []  # (schema_name, gained_props, lost_props)
          for name in sorted(set(old_schemas) & set(new_schemas)):
              op = set((old_schemas[name].get("properties") or {}).keys())
              np = set((new_schemas[name].get("properties") or {}).keys())
              gained, lost = sorted(np - op), sorted(op - np)
              if gained or lost:
                  prop_changes.append((name, gained, lost))

          changed = bool(added_paths or removed_paths or old_version != new_version
                         or added_schemas or removed_schemas or prop_changes)

          if changed:
              lines = [f"API version: {old_version} -> {new_version}"]
              if added_paths:
                  lines.append(f"\nNew endpoints ({len(added_paths)}):")
                  for p in sorted(added_paths):
                      lines.append(f"  + {p}")
              if removed_paths:
                  lines.append(f"\nRemoved endpoints ({len(removed_paths)}):")
                  for p in sorted(removed_paths):
                      lines.append(f"  - {p}")
              if added_schemas:
                  lines.append(f"\nNew schemas ({len(added_schemas)}):")
                  for s in added_schemas:
                      lines.append(f"  + {s}")
              if removed_schemas:
                  lines.append(f"\nRemoved schemas ({len(removed_schemas)}):")
                  for s in removed_schemas:
                      lines.append(f"  - {s}")
              if prop_changes:
                  lines.append(f"\nSchema property changes ({len(prop_changes)} schemas):")
                  for name, gained, lost in prop_changes:
                      if gained:
                          lines.append(f"  {name}: + {gained}")
                      if lost:
                          lines.append(f"  {name}: - {lost}")
              with open("/tmp/openapi-diff.txt", "w") as f:
                  f.write("\n".join(lines) + "\n")

          with open("/tmp/openapi-result.txt", "w") as f:
              f.write("true" if changed else "false")
          print(f"changed={'true' if changed else 'false'}")
          PYEOF
           RESULT=$(cat /tmp/openapi-result.txt | tr -d '[:space:]')
           echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Create issue on drift
        if: steps.llms-diff.outputs.changed == 'true' || steps.openapi-diff.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            let body = "The SHC API has changed. Review and update shc-toolkit.\n\n";

            if ("${{ steps.llms-diff.outputs.changed }}" === "true") {
              body += "## llms.txt changes\n\n";
              body += "```diff\n";
              const { readFileSync } = require('fs');
              try {
                body += readFileSync('/tmp/llms-diff.txt', 'utf8');
              } catch (e) {
                body += "(diff file not available)";
              }
              body += "\n```\n\n";
            }

            if ("${{ steps.openapi-diff.outputs.result }}" === "true") {
              body += "## openapi.json changes\n\n";
              try {
                body += "```diff\n";
                body += readFileSync('/tmp/openapi-diff.txt', 'utf8');
                body += "\n```\n";
              } catch (e) {
                body += "(see openapi.json diff in artifacts)\n";
              }
            }

            body += "\n## Action items\n";
            body += "1. Review the changes above\n";
            body += "2. Update `shc_toolkit/openapi.json` with the new spec\n";
            body += "3. Update `shc_toolkit/client.py` if new endpoints were added\n";
            body += "4. Update CLI commands if needed\n";
            body += "5. Run tests: `python3 -m pytest tests/test_unit.py`\n";
            body += "6. Update `.omo/llms.txt` baseline after review\n";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "API drift detected: SHC API has changed",
              body: body,
              labels: ["api-drift", "enhancement"]
            });

      - name: Update baselines
        if: github.event_name == 'workflow_dispatch'
        run: |
          cp /tmp/llms-new.txt .omo/llms.txt
          if [ -f /tmp/openapi-new.json ]; then
            cp /tmp/openapi-new.json shc_toolkit/openapi.json
          fi

      - name: Commit updated baselines
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .omo/llms.txt shc_toolkit/openapi.json
          git commit -m "chore: update SHC API baselines [skip ci]" || echo "No changes to commit"
          git push
