name: SHC API Tests

on:
  push:
    branches: [main]
    paths: ['shc_toolkit/**', 'tests/**', '.github/workflows/shc-tests.yml']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  unit-tests:
    name: Unit tests (no API key needed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e . -q && pip install pytest -q
      - run: python -m pytest tests/test_unit.py -v --tb=short

  smoke-tests:
    name: Read-only smoke tests (no VM creation)
    runs-on: ubuntu-latest
    env:
      SHC_API_KEY: ${{ secrets.SHC_API_KEY_READ_ONLY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e . -q
      - run: pip install pytest -q
      - name: Run read-only tests
        run: python -m pytest tests/test_shc_api.py -v -k "test_account_balance or test_ordering_catalog or test_vm_templates or test_list_vms or test_openapi" --tb=short

  integration-tests:
    name: Full integration tests (creates + destroys VMs)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      SHC_API_KEY: ${{ secrets.SHC_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e . -q && pip install pytest -q
      - name: Pick random transport (REST or MCP)
        run: |
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "SHC_TEST_TRANSPORT=rest" >> $GITHUB_ENV
            echo "Testing via: REST"
          else
            echo "SHC_TEST_TRANSPORT=mcp" >> $GITHUB_ENV
            echo "Testing via: MCP"
          fi
      - name: Check credit balance
        run: |
          BALANCE=$(python -c "
          from shc_toolkit import create_client
          c = create_client(transport='rest')
          print(c.get_available_credit())
          ")
          echo "Available credit: \$$BALANCE"
          if (( $(echo "$BALANCE < 0.50" | bc -l) )); then
            echo "::error::Insufficient credit (\$$BALANCE). Need at least \$0.50 for integration tests."
            exit 1
          fi
      - name: Run full test suite
        run: python -m pytest tests/test_shc_api.py -v --tb=short
      - name: Reap orphaned VMs
        if: always()
        run: python scripts/reap_orphan_vms.py --execute --max-age 0
        working-directory: ${{ github.workspace }}

  openapi-drift:
    name: OpenAPI spec drift detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fetch live OpenAPI spec
        run: |
          curl -s https://blesta.sovereignhybridcompute.com/user-api/openapi.json > /tmp/live-spec.json
          python3 -c "
          import json
          with open('/tmp/live-spec.json') as f:
              live = json.load(f)
          with open('shc_toolkit/openapi.json') as f:
              cached = json.load(f)

          live_version = live.get('info', {}).get('version', '?')
          cached_version = cached.get('info', {}).get('version', '?')
          live_paths = set(live.get('paths', {}).keys())
          cached_paths = set(cached.get('paths', {}).keys())

          print(f'Live version: {live_version} ({len(live_paths)} paths)')
          print(f'Cached version: {cached_version} ({len(cached_paths)} paths)')

          new_paths = live_paths - cached_paths
          removed_paths = cached_paths - live_paths

          if new_paths:
               print(f'::warning::New endpoints not in cache: {new_paths}')
          if removed_paths:
               print(f'::warning::Endpoints removed from API: {removed_paths}')
          if live_version != cached_version:
               print(f'::warning::API version changed: {cached_version} → {live_version}')
               print('Run: curl https://blesta.sovereignhybridcompute.com/user-api/openapi.json > shc_toolkit/openapi.json')

          if new_paths or removed_paths or live_version != cached_version:
               with open('/tmp/openapi-diff.txt', 'w') as f:
                    f.write(f'API version: {cached_version} → {live_version}\n')
                    if new_paths:
                         f.write(f'\nNew endpoints ({len(new_paths)}):\n')
                         for p in sorted(new_paths):
                              f.write(f'  + {p}\n')
                    if removed_paths:
                         f.write(f'\nRemoved endpoints ({len(removed_paths)}):\n')
                         for p in sorted(removed_paths):
                              f.write(f'  - {p}\n')
               exit(1)
          print('No drift detected ✅')
          "

      - name: Create issue on OpenAPI drift
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const { readFileSync } = require('fs');
            let diff = '(diff not available)';
            try { diff = readFileSync('/tmp/openapi-diff.txt', 'utf8'); } catch (e) {}

            // Deduplicate: skip if an open api-drift issue already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-drift'
            });
            if (existing.data.length > 0) {
              console.log(`Issue already exists: #${existing.data[0].number} — skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'API drift detected: SHC API spec has changed',
              body: '## OpenAPI spec drift detected\n\n```diff\n' + diff + '\n```\n\n## Action items\n1. Review the changes above\n2. Update `shc_toolkit/openapi.json` with the new spec\n3. Wrap new endpoints in `shc_toolkit/client.py`\n4. Add new MCP tools to `TOOL_MAP` in `mcp_client.py`\n5. Run tests: `python3 -m pytest tests/test_unit.py`\n6. Close this issue once the spec is updated',
              labels: ['api-drift', 'enhancement']
            });

  mcp-drift:
    name: MCP tool drift detection
    runs-on: ubuntu-latest
    env:
      SHC_API_KEY: ${{ secrets.SHC_API_KEY_READ_ONLY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e . -q
      - name: Compare client tool names against live MCP server
        run: |
          python3 -c "
          import re, sys
          from shc_toolkit.mcp_client import SHCMCPClient, TOOL_MAP

          c = SHCMCPClient()
          tools = c.list_tools()
          if isinstance(tools, dict):
              tools = tools.get('tools', tools.get('items', []))
          server_names = {t['name'] for t in tools}

          with open('shc_toolkit/mcp_client.py') as f:
              src = f.read()
          client_names = set(re.findall(r'call_tool\(\"(\w+)\"', src)) | set(TOOL_MAP.values())

          broken = client_names - server_names
          unwrapped = server_names - client_names

          print(f'Server tools: {len(server_names)}')
          print(f'Client tools: {len(client_names)}')
          print(f'Unwrapped server tools: {len(unwrapped)}')

           if broken:
               print(f'::error::Client calls {len(broken)} tool(s) not on server:')
               for name in sorted(broken):
                   print(f'  ❌ {name}')
               print('Fix: update the tool name in mcp_client.py to match the server.')
               with open('/tmp/mcp-drift.txt', 'w') as f:
                   f.write(f'Broken tools ({len(broken)}):\n')
                   for name in sorted(broken):
                       f.write(f'  ❌ {name}\n')
               sys.exit(1)

           if unwrapped:
               print(f'::warning::{len(unwrapped)} server tool(s) not wrapped by client (coverage gap):')
               for name in sorted(unwrapped):
                   print(f'  ⚠ {name}')

           print('No broken tool names ✅')
           "

      - name: Create issue on MCP drift
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const { readFileSync } = require('fs');
            let diff = '(diff not available)';
            try { diff = readFileSync('/tmp/mcp-drift.txt', 'utf8'); } catch (e) {}

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-drift'
            });
            if (existing.data.length > 0) {
              console.log(`Issue already exists: #${existing.data[0].number} — skipping`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'MCP tool drift detected: client calls non-existent server tools',
              body: '## MCP tool drift detected\n\nThe shc-toolkit MCP client calls tool names that the live SHC MCP server does not recognize. This means the server renamed or removed a tool and the client needs updating.\n\n```diff\n' + diff + '\n```\n\n## Action items\n1. Check the live MCP server tool list\n2. Update the tool name in `shc_toolkit/mcp_client.py` to match\n3. Run: `python3 -m pytest tests/test_unit.py`\n4. Close this issue once fixed',
              labels: ['api-drift', 'bug']
            });

  reaper:
    name: Reap orphaned VMs
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      SHC_API_KEY: ${{ secrets.SHC_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e . -q
      - name: Cancel orphaned CI/test VMs older than 2 hours
        run: python scripts/reap_orphan_vms.py --execute --max-age 2
