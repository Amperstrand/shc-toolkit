---
name: coverage

on:
  push:
    paths:
      - 'shc_toolkit/**'
      - 'tests/**'
      - '.github/workflows/coverage.yml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'shc_toolkit/**'
      - 'tests/**'
      - '.github/workflows/coverage.yml'
      - 'pyproject.toml'

jobs:
  coverage:
    name: Test coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e . -q && pip install pytest pytest-cov -q
      - name: Run tests with coverage
        run: python -m pytest tests/test_unit.py tests/test_github_runner.py tests/test_ansible.py tests/test_network_fixture.py --cov=shc_toolkit --cov-report=term-missing --cov-report=xml
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30