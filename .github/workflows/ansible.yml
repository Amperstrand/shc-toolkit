---
# Workflow: ansible-lint for the ansible/ subtree.
#
# Runs ansible-lint on every push/PR that touches ansible/ (fast, no
# Docker needed). Pre-existing violations are baselined in
# ansible/.ansible-lint-ignore; only NEW violations fail the build.
#
# Molecule scenarios were explored but deferred — see GitHub issue
# "molecule testing for ansible roles" for the technical blockers
# (caddy apt post-install auto-starts the service in a container where
# the Caddyfile points at non-existent cert paths; systemd-in-Docker
# needs a non-default image; etc).

name: ansible

on:
  push:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible.yml'
  pull_request:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible.yml'

jobs:
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install ansible-lint
      - run: ansible-lint --offline .
