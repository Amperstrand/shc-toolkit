---
# Workflow: ansible-lint + molecule for the ansible/ subtree.
#
# ansible-lint runs on every push/PR (fast, no Docker needed). Pre-
# existing violations are baselined in ansible/.ansible-lint-ignore;
# only NEW violations fail the build.
#
# molecule caddy scenario runs on every push/PR (slower, Docker needed
# — provided by GitHub Actions runners). It uses prepare.yml to
# generate self-signed TLS certs so the caddy apt post-install hook
# succeeds despite the Caddyfile pointing at a domain that doesn't
# resolve in the container.

name: ansible

on:
  push:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible.yml'
  pull_request:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible.yml'

jobs:
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install ansible-lint
      - run: ansible-lint --offline .

  molecule-caddy:
    name: molecule / caddy scenario
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install molecule molecule-plugins[docker]
      - run: molecule test --scenario-name caddy
        env:
          ANSIBLE_FORCE_COLOR: "1"
